version: '3.8'

# ─────────────────────────────────────────────────────────────
# vaporRMM — staging environment
#
# Usage:
#   cp .env.staging.example .env.staging
#   docker compose -f docker-compose.staging.yml --env-file .env.staging up -d
#
# Differences from production:
#   - SQLite instead of PostgreSQL (simpler staging setup)
#   - Self-signed TLS certs auto-generated
#   - Lower resource limits
#   - No CDN / no external caching layer
# ─────────────────────────────────────────────────────────────

services:

  # ── API server ────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: vaporrmm-staging-server
    environment:
      DATABASE_PATH:   /data/vapor_rmm.db
      JWT_SECRET:      ${JWT_SECRET:?set JWT_SECRET in .env.staging}
      SERVER_PORT:     8080
      CORS_ORIGINS:    ${CORS_ORIGINS:-http://localhost:3000}
      ADMIN_PASSWORD:  ${ADMIN_PASSWORD:-}
      OFFLINE_THRESHOLD_SECONDS: ${OFFLINE_THRESHOLD_SECONDS:-120}
      METRICS_RETENTION_SECONDS: ${METRICS_RETENTION_SECONDS:-86400}
    volumes:
      - vaporrmm-staging-data:/data
    networks:
      - vaporrmm-staging-internal
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 64M

  # ── Dashboard ─────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    container_name: vaporrmm-staging-dashboard
    environment:
      NODE_ENV: production
    depends_on:
      server:
        condition: service_healthy
    networks:
      - vaporrmm-staging-internal
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 64M

  # ── Prometheus (metrics scraper) ──────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: vaporrmm-staging-prometheus
    volumes:
      - ./prometheus/staging.yml:/etc/prometheus/prometheus.yml:ro
      - vaporrmm-staging-prometheus:/prometheus
    networks:
      - vaporrmm-staging-internal
    ports:
      - "9090:9090"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  # ── Grafana (dashboards) ──────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.0
    container_name: vaporrmm-staging-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - vaporrmm-staging-grafana:/var/lib/grafana
      - ./grafana/dashboard.json:/etc/grafana/provisioning/dashboards/vaporrmm.json:ro
    networks:
      - vaporrmm-staging-internal
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

volumes:
  vaporrmm-staging-data:
  vaporrmm-staging-prometheus:
  vaporrmm-staging-grafana:

networks:
  vaporrmm-staging-internal:
    driver: bridge
