version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: vaporrmm-server
    # Codex #3: bind to host loopback by default; the previous
    # "8080:8080" mapping bound 0.0.0.0:8080 on the host and exposed
    # an unhardened admin API to the network. Operators behind a
    # reverse proxy (Caddy / nginx) keep loopback; operators on a
    # trusted network override BIND_ADDR=0.0.0.0 in their shell env.
    ports:
      - "${BIND_ADDR:-127.0.0.1}:8080:8080"
    environment:
      # No literal default for JWT_SECRET / ADMIN_PASSWORD. .env is
      # required and setup-docker.sh generates the random values.
      # An operator running `docker compose up` without .env will
      # hit RefuseSentinelSecrets at boot (good) or be missing the
      # vars entirely (also good — server fails closed).
      - JWT_SECRET=${JWT_SECRET}
      - SECRETS_ENCRYPTION_KEY=${SECRETS_ENCRYPTION_KEY}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - DATABASE_PATH=/app/data/vapor_rmm.db
      - SERVER_PORT=8080
      - SERVER_HOST=0.0.0.0
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - MOONLIGHT_WEB_URL=${MOONLIGHT_WEB_URL:-http://localhost:8081}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  dashboard:
    build:
      context: ./dashboard-files
      dockerfile: Dockerfile
    container_name: vaporrmm-dashboard
    # Codex #3: loopback by default. Reverse proxy or BIND_ADDR=0.0.0.0
    # for external exposure.
    ports:
      - "${BIND_ADDR:-127.0.0.1}:3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api
    restart: unless-stopped
    depends_on:
      - server

  moonlight-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.moonlight-web
    container_name: vaporrmm-moonlight-web
    ports:
      - "8081:8080"
      - "40000-40100:40000-40100/udp"
    environment:
      - WEBRTC_NAT_1TO1_HOST=${WEBRTC_NAT_1TO1_HOST:-}
    restart: unless-stopped
