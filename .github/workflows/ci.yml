name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Defense-in-depth opt-in to the Node 24 runtime for any JavaScript
  # action that still declares node20 in its action.yml. The actions
  # we use directly (checkout/setup-node/setup-go/pnpm/upload+download
  # artifact) are pinned to versions that already declare node24, so
  # this flag is effectively a no-op today — it remains in place to
  # catch any transitively-pulled v4-era action before the June 2 2026
  # forced cutover. If Node 24 ever breaks an action we depend on, set
  # ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION=true as a temporary fallback.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Default least-privilege token. Jobs that need more (docker push,
# release upload) override per-job below. Closes the
# actions/missing-workflow-permissions code-scanning alerts.
permissions:
  contents: read

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # pnpm has to land BEFORE setup-node, otherwise `cache: 'pnpm'` can't
      # locate the binary it needs to compute the cache key. The version is
      # pinned (NOT @latest) so a pnpm 10/11 release can't silently change
      # lockfile semantics under us.
      # No `version:` here — pnpm/action-setup v4 picks up the version
      # from packageManager in the root package.json (currently 9.15.0).
      # Specifying both produces ERR_PNPM_BAD_PM_VERSION.
      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        run: |
          cd apps/dashboard
          pnpm lint

      - name: Type check frontend
        run: |
          cd apps/dashboard
          pnpm typecheck

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # No `version:` here — pnpm/action-setup v4 picks up the version
      # from packageManager in the root package.json (currently 9.15.0).
      # Specifying both produces ERR_PNPM_BAD_PM_VERSION.
      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: |
          cd apps/dashboard
          pnpm test

      - name: Install Playwright browsers
        run: |
          cd apps/dashboard
          npx playwright install chromium

      - name: Run E2E tests
        run: |
          cd apps/dashboard
          pnpm test:e2e

  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          # Must match go.work toolchain (1.25.0). Transitive deps like
          # x/sys 0.42.0 and x/crypto 0.49.0 declare `go 1.25`, so 1.23/1.24
          # produce "package requires newer Go version go1.25" typecheck
          # errors that cascade into bogus "undefined: fiber" noise.
          go-version: '1.25'
          cache: true
          # Cache key has to include every per-module go.sum, not just the
          # workspace sum — without these the dep cache misses and tools
          # like golangci-lint fall back to typechecking against unresolved
          # imports, which manifests as bogus "undefined: fiber" /
          # "undefined: websocket" errors and a phantom "v2 redeclared"
          # collision (the typechecker uses the last path segment when it
          # can't load the package itself).
          cache-dependency-path: |
            go.work.sum
            packages/server/go.sum
            packages/agent/go.sum
            packages/cli/go.sum

      # golangci-lint loads packages and their deps; without this download
      # the lint container starts with an empty module cache and typecheck
      # fails on every external import.
      - name: Download Go modules
        run: |
          cd packages/server && go mod download
          cd ../agent && go mod download
          cd ../cli && go mod download

      # Build golangci-lint from source with the workflow's Go toolchain
      # (1.25). The pre-built binary distributed by golangci-lint-action
      # was compiled with Go 1.24 and refuses to typecheck modules that
      # declare `go 1.25` (x/sys 0.42.0, x/crypto 0.49.0), failing every
      # external import as "undefined: fiber". Pinned to v1.64.8 — the
      # last v1 release; v2 changed the config schema.
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: Run golangci-lint
        run: |
          cd packages/server
          golangci-lint run --timeout=5m

  go-test:
    name: Go Tests & Coverage
    runs-on: ubuntu-latest
    needs: go-lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          # Must match go.work toolchain (1.25.0) — see go-lint job comment.
          go-version: '1.25'
          cache: true
          cache-dependency-path: |
            go.work.sum
            packages/server/go.sum
            packages/agent/go.sum
            packages/cli/go.sum

      - name: Download Go modules
        run: |
          cd packages/server && go mod download
          cd ../agent && go mod download
          cd ../cli && go mod download

      # Generate a real per-run encryption key so the server-side crypto
      # init doesn't os.Exit(1). DEV_ALLOW_UNENCRYPTED_SECRETS=1 would also
      # work, but a real key exercises the encrypt/decrypt path in tests.
      - name: Generate ephemeral SECRETS_ENCRYPTION_KEY
        id: secret_key
        run: echo "key=$(openssl rand -base64 32)" >> "$GITHUB_OUTPUT"

      - name: Run server tests with coverage
        env:
          SECRETS_ENCRYPTION_KEY: ${{ steps.secret_key.outputs.key }}
          JWT_SECRET: ${{ steps.secret_key.outputs.key }}
        run: |
          cd packages/server
          go test -v -race -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out

      - name: Run agent tests with coverage
        run: |
          cd packages/agent
          go test -v -race -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out

      - name: Run CLI tests with coverage
        run: |
          cd packages/cli
          go test -v -race -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out

  build-server:
    name: Build Go Server
    runs-on: ubuntu-latest
    needs: go-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: |
            packages/server/go.sum
            go.work.sum

      - name: Build server binary
        run: |
          cd packages/server
          go build -o vaporrmm-server .

      - name: Upload server binary
        uses: actions/upload-artifact@v7
        with:
          name: server-linux-amd64
          path: packages/server/vaporrmm-server
          retention-days: 7

  build-agent:
    name: Build Go Agent
    runs-on: ubuntu-latest
    needs: go-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: |
            packages/agent/go.sum
            go.work.sum

      - name: Build agent binary (Linux AMD64)
        run: |
          cd packages/agent
          GOOS=linux GOARCH=amd64 go build -o vaporrmm-agent-linux-amd64 .

      - name: Build agent binary (Linux ARM64)
        run: |
          cd packages/agent
          GOOS=linux GOARCH=arm64 go build -o vaporrmm-agent-linux-arm64 .

      - name: Build agent binary (Windows AMD64)
        run: |
          cd packages/agent
          GOOS=windows GOARCH=amd64 go build -o vaporrmm-agent-windows-amd64.exe .

      - name: Build agent binary (macOS AMD64)
        run: |
          cd packages/agent
          GOOS=darwin GOARCH=amd64 go build -o vaporrmm-agent-darwin-amd64 .

      - name: Build agent binary (macOS ARM64)
        run: |
          cd packages/agent
          GOOS=darwin GOARCH=arm64 go build -o vaporrmm-agent-darwin-arm64 .

      - name: Upload Linux AMD64 agent
        uses: actions/upload-artifact@v7
        with:
          name: agent-linux-amd64
          path: packages/agent/vaporrmm-agent-linux-amd64
          retention-days: 7

      - name: Upload Linux ARM64 agent
        uses: actions/upload-artifact@v7
        with:
          name: agent-linux-arm64
          path: packages/agent/vaporrmm-agent-linux-arm64
          retention-days: 7

      - name: Upload Windows AMD64 agent
        uses: actions/upload-artifact@v7
        with:
          name: agent-windows-amd64
          path: packages/agent/vaporrmm-agent-windows-amd64.exe
          retention-days: 7

      - name: Upload macOS AMD64 agent
        uses: actions/upload-artifact@v7
        with:
          name: agent-darwin-amd64
          path: packages/agent/vaporrmm-agent-darwin-amd64
          retention-days: 7

      - name: Upload macOS ARM64 agent
        uses: actions/upload-artifact@v7
        with:
          name: agent-darwin-arm64
          path: packages/agent/vaporrmm-agent-darwin-arm64
          retention-days: 7

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [build-server, build-agent]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR rejects mixed-case repo names. github.repository preserves the
      # original capitalisation (e.g. tabiznet/VaporwareRMM), so we lowercase
      # it once here and feed the result to every tag below.
      - name: Compute lowercase image name
        id: img
        run: echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}/server:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}/server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/dashboard/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}/dashboard:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}/dashboard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-compose-test:
    name: Test Docker Compose
    runs-on: ubuntu-latest
    needs: [build-server, build-agent]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # docker-compose.yml uses ${VAR:?msg} interpolation for the secrets
      # the server needs at boot. Generate ephemeral values for the smoke
      # test instead of committing real ones. Includes JWT_SECRET (>=32
      # chars per the new auth gate), SECRETS_ENCRYPTION_KEY (base64 32B),
      # ADMIN_PASSWORD (matches complexity rules), and POSTGRES_PASSWORD.
      - name: Build and start services
        run: |
          {
            echo "POSTGRES_PASSWORD=$(openssl rand -hex 16)"
            echo "JWT_SECRET=$(openssl rand -base64 48)"
            echo "SECRETS_ENCRYPTION_KEY=$(openssl rand -base64 32)"
            echo "ADMIN_PASSWORD=CiSmoke#$(openssl rand -hex 8)"
            # agent-example is in the dev profile and won't start, but
            # `docker compose down` still validates env interpolation across
            # every service in the file; provide a dummy value so teardown
            # doesn't error.
            echo "AGENT_TOKEN=ci-smoke-not-a-real-token"
          } > .env
          docker compose up --build -d

      - name: Wait for services to be ready
        run: |
          sleep 30
          curl -f http://localhost:8080/health || exit 1

      - name: Stop services
        if: always()
        run: docker compose down

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'table'
          output: 'trivy-fs-results.txt'

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/server:${{ github.sha }}
          format: 'table'
          output: 'trivy-image-results.txt'

      - name: Upload Trivy results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: trivy-scan-results
          path: |
            trivy-fs-results.txt
            trivy-image-results.txt

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [docker-build, security-scan]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: '*'
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            artifacts/vaporrmm-server
            artifacts/vaporrmm-agent-linux-amd64
            artifacts/vaporrmm-agent-linux-arm64
            artifacts/vaporrmm-agent-windows-amd64.exe
            artifacts/vaporrmm-agent-darwin-amd64
            artifacts/vaporrmm-agent-darwin-arm64
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}