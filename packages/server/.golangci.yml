run:
  timeout: 5m
  go: "1.25"

# Pared back to bug-finders + auto-fixable formatting. The earlier
# config (gocritic+govet enable-all+unparam+dupl+prealloc) flagged
# ~1700 style/opinion issues that the codebase doesn't follow. Keep
# what catches real bugs; defer aesthetic polish.
linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - gofmt
    - goimports
    - misspell

linters-settings:
  errcheck:
    check-type-assertions: false
    check-blank: false
    exclude-functions:
      # Fire-and-forget broadcasts; callers don't react to write errors.
      - (*github.com/gofiber/websocket/v2.Conn).WriteMessage
      - (*github.com/gofiber/websocket/v2.Conn).WriteJSON
      # Audit/event log writes are best-effort.
      - vaporrmm/server/internal/events.AuditLog
  govet:
    disable:
      - shadow
      - fieldalignment

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - bodyclose
    - path: internal/db/db\.go
      linters:
        - errcheck
      text: "Error return value of `rows.Close` is not checked"
    - linters:
        - errcheck
      text: "Error return value of `c.Next` is not checked"
  max-issues-per-linter: 0
  max-same-issues: 0
